name: Trigger meltflake.com deploy
on:
  push:
    branches: [main, master]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger meltflake-site rebuild
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.DEPLOY_PAT }}" \
            https://api.github.com/repos/meltflake/meltflake-site/dispatches \
            -d '{"event_type":"rebuild","client_payload":{"repo":"'"${GITHUB_REPOSITORY}"'"}}'
